name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

defaults:
  run:
    working-directory: backend

jobs:
  backend-ci:
    name: Lint, Type Check, and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: lucky_insight
          POSTGRES_PASSWORD: lucky_insight_ci_password
          POSTGRES_DB: lucky_insight
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lucky_insight"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://lucky_insight:lucky_insight_ci_password@localhost:5432/lucky_insight
      JWT_SECRET_KEY: ci-test-secret-key-1234567890-ci-test-secret-key-1234567890
      JWT_REFRESH_SECRET: ci-test-refresh-secret-key-1234567890-ci-test-refresh-secret-key-1234567890
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      LOG_LEVEL: INFO
      APP_ENV: test
      DEBUG: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Black --check
        run: uv run black --check .

      - name: Run MyPy
        run: uv run mypy app tests alembic/env.py

      - name: Run Pytest
        run: uv run pytest
